name: k6 Load Test

on:
  push:
    branches: -main
  pull_request:
     branches: -main
   workflow_dispatch:
     
jobs:
  K6-test:
    runs-on: ubuntu-latest
    
    steps:
    - name:  Checkout code
      uses: actions/checkout@v3

    - name: Run k6-test
      uses: grafana/k6-action@v0.2.0

    - name: Run K6 Test
        
      run: k6 run test.js

      
